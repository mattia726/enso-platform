  function init(){ render(); }

  function render(){
    const opacity=opS.value/100;
    const threshold=thS.value/100;
    opV.textContent=opS.value;
    thV.textContent=threshold.toFixed(2);

    // Draw base
    ctx.globalAlpha=1;
    ctx.drawImage(baseImg,0,0,cv.width,cv.height);

    if(!ovData) return;

    // Build filtered overlay
    const filtered=new ImageData(new Uint8ClampedArray(ovData.data), ovData.width, ovData.height);
    const d=filtered.data;
    for(let i=0;i<d.length;i+=4){
      const score=d[i+3]/255; // alpha channel encodes raw score
      if(score<threshold || d[i+3]===0){
        d[i+3]=0;
      } else {
        d[i+3]=Math.round(opacity*255);
      }
    }
    const oc=document.createElement('canvas');
    oc.width=ovData.width; oc.height=ovData.height;
    oc.getContext('2d').putImageData(filtered,0,0);

    ctx.globalAlpha=1;
    ctx.drawImage(oc,0,0,cv.width,cv.height);
  }
