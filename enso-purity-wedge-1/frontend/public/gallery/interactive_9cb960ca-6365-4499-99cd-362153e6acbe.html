      const score=d[i+3]/255; // alpha channel encodes raw score
      if(score<threshold || d[i+3]===0){
        d[i+3]=0;
      } else {
        d[i+3]=Math.round(opacity*255);
      }
    }
    const oc=document.createElement('canvas');
    oc.width=ovData.width; oc.height=ovData.height;
    oc.getContext('2d').putImageData(filtered,0,0);

    ctx.globalAlpha=1;
    ctx.drawImage(oc,0,0,cv.width,cv.height);
  }

  opS.addEventListener('input',render);
  thS.addEventListener('input',render);
})();
</script></body></html>
